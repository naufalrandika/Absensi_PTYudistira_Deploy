{% extends "base.html" %}

{% block title %}Tambah Lembar Waktu Kerja - Sistem Presensi Karyawan{% endblock %}

{% block content %}
<div class="space-y-6 max-w-3xl">
    <div>
        <h1 class="text-3xl font-bold gradient-text">Tambah Aktivitas Harian</h1>
        <p class="text-slate-600 mt-2">Catat aktivitas yang sudah dikerjakan beserta durasinya.</p>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white/90 shadow-xl p-6">
        <form method="POST" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Tanggal *</label>
                    <input type="date" name="activity_date" required value="{{ today }}"
                           class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Jam Mulai *</label>
                    <input type="time" name="start_time" required
                           class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700">Jam Selesai *</label>
                    <input type="time" name="end_time" required
                           class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700">Judul Aktivitas *</label>
                <input type="text" name="activity_title" required maxlength="150"
                       placeholder="Contoh: Menyusun laporan penjualan mingguan"
                       class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700">Keterangan Aktivitas</label>
                <textarea name="activity_description" rows="4"
                          placeholder="Detail pekerjaan, output, atau hambatan (opsional)"
                          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <a href="{{ url_for('time_worksheet.index') }}" class="px-5 h-10 inline-flex items-center rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">Batal</a>
                <button type="submit" class="px-5 h-10 inline-flex items-center rounded-lg bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold hover:shadow-lg">
                    Simpan Aktivitas
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
